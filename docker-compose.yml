# version: '3.8'

services:
  db_container:
    image: postgres:15
    container_name: postgres_geo
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lugares_db
    volumes:
      - geo_data:/var/lib/postgresql/data
    networks:
      - geo_network

  api:
    build: .
    container_name: fastapi_geo
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://user:password@postgres_geo:5432/lugares_db
    depends_on:
      db_container:
        condition: service_started
    networks:
      - geo_network

networks:
  geo_network:
    driver: bridge

volumes:
  geo_data:
